apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: temperature-sensor-spring
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: temperature-sensor-spring
spec:
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/jesperfrisk/openshift-demo.git
      ref: lab
    contextDir: tempsensor-service-spring
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: temperature-sensor-spring:latest
  triggers:
    - type: ConfigChange