<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Thermostat History</title>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; }
        header { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        #status { opacity: 0.8; }
        .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
        canvas { max-width: 1920px; }
        input, select, button { padding: 6px 10px; }
    </style>
</head>
<body>
<header>
    <h2>Thermostat History</h2>
</header>

<p style="opacity:.85">
    Tip: Each sensor is a line. Heating “on” points are shown as triangles.
</p>

<canvas id="chart" height="120"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
    const API_BASE = "";
    const refreshTimeSeconds = 1;
    const filterMinutes = 2;

    let chart;
    let timer;

    function parseDateSafe(s) {
        const d = new Date(s);
        return isNaN(d.getTime()) ? null : d;
    }

    async function fetchReadings() {
        const url = `${API_BASE}/temperature-sensor-reading`;
        const res = await fetch(url, { headers: { "Accept": "application/json" }});
        if (!res.ok) throw new Error(`GET ${url} failed: ${res.status}`);
        const data = await res.json();
        if (!Array.isArray(data)) throw new Error("Response was not an array");
        return data;
    }
    function groupBySensor(readings) {
        const map = new Map();
        for (const r of readings) {
            const sensorId = r.temperatureSensorId ?? "unknown";
            const readAt = parseDateSafe(r.readAt);
            if (!readAt) continue;

            if (!map.has(sensorId)) map.set(sensorId, []);
            map.get(sensorId).push({
                x: readAt,
                y: Number(r.celsius),
                heating: Boolean(r.heating)
            });
        }

        for (const [k, points] of map.entries()) {
            points.sort((a, b) => a.x - b.x);
        }
        return map;
    }

    function filterLastMinutes(readings) {
        return readings.filter(r => {
            const d = parseDateSafe(r.readAt);
            return d && d.getTime() >= (Date.now() - filterMinutes * 60 * 1000) ;
        });
    }

    function buildDatasets(sensorMap) {
        const datasets = [];
        for (const [sensorId, points] of sensorMap.entries()) {
            // Chart.js allows per-point styling via scriptable options,
            // so we can show "heating on" as triangles.
            datasets.push({
                label: sensorId,
                data: points,
                tension: 0.2,
                pointRadius: 3,
                pointStyle: (ctx) => {
                    const p = ctx.raw;
                    return p && p.heating ? "triangle" : "circle";
                },
                pointRotation: (ctx) => {
                    const p = ctx.raw;
                    return p && p.heating ? 0 : 0;
                }
            });
        }
        return datasets;
    }

    function ensureChart(datasets) {
        const ctx = document.getElementById("chart");
        if (chart) {
            chart.data.datasets = datasets;
            chart.update();
            return;
        }

        chart = new Chart(ctx, {
            type: "line",
            data: {datasets},
            options: {
                animation: false,
                scales: {
                    x: {
                        type: "time",
                        time: { unit: "second", tooltipFormat: "yyyy-MM-dd HH:mm:ss" },
                        title: { display: true, text: "Time" }
                    },
                    y: {
                        title: { display: true, text: "°C" }
                    }
                }
            }
        });
    }

    async function loadAndRender() {
        try {
            const data = await fetchReadings();
            const filtered = filterLastMinutes(data);
            const grouped = groupBySensor(filtered);
            const datasets = buildDatasets(grouped);
            ensureChart(datasets);
        } catch (e) {
            console.error(e);
            statusEl.textContent = `Error: ${e.message}`;
        }
    }

    function restartTimer() {
        if (timer) clearInterval(timer);
        if (refreshTimeSeconds > 0) {
            timer = setInterval(loadAndRender, refreshTimeSeconds * 1000);
        }
    }

    loadAndRender();
    restartTimer();
</script>

<!-- Chart.js time scale needs a date adapter; easiest is Luxon -->
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
</body>
</html>
