{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name | quote }}
  labels:
    {{ include "thermostat-mysql.labels" . | nindent 4 }}
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: {{ .Values.secret.rootPassword | quote }}
  MYSQL_PASSWORD: {{ .Values.secret.password | quote }}
{{- end }}